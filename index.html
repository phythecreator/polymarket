<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilaMarket • The Information Markets Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-base: #0e1014;
            --bg-panel: #1c1e23;
            --bg-hover: #2b2f36;
            --border-color: #2b2f36;
            --poly-blue: #2152ff;
            --poly-green: #00c853;
            --poly-green-bg: rgba(0, 200, 83, 0.15);
            --poly-red: #ff3d00;
            --poly-red-bg: rgba(255, 61, 0, 0.15);
            --text-main: #ffffff;
            --text-muted: #8b94a3;
        }

        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Navbar */
        .navbar { background: var(--bg-base); border-bottom: 1px solid var(--border-color); padding: 12px 24px; }
        .nav-balance { background: var(--bg-panel); padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; }

        /* Layout Main */
        .market-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
        .market-stats { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; margin-bottom: 20px; }
        
        .panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; }
        
        /* Order Ticket (Lateral Direita) */
        .order-ticket { position: sticky; top: 20px; }
        .btn-yes { background: var(--bg-base); color: var(--poly-green); border: 1px solid var(--border-color); font-weight: 600; width: 100%; padding: 12px; border-radius: 8px; transition: 0.2s; }
        .btn-yes:hover, .btn-yes.active { background: var(--poly-green-bg); border-color: var(--poly-green); }
        .btn-no { background: var(--bg-base); color: var(--poly-red); border: 1px solid var(--border-color); font-weight: 600; width: 100%; padding: 12px; border-radius: 8px; transition: 0.2s; }
        .btn-no:hover, .btn-no.active { background: var(--poly-red-bg); border-color: var(--poly-red); }
        
        .input-amount { background: var(--bg-base); border: 1px solid var(--border-color); color: white; font-size: 1.5rem; font-weight: 600; padding: 15px; border-radius: 8px; width: 100%; text-align: right; outline: none; }
        .input-amount:focus { border-color: var(--poly-blue); }
        
        .summary-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .summary-val { color: var(--text-main); font-weight: 600; }
        
        .btn-buy { background: var(--poly-blue); color: white; border: none; font-weight: 600; width: 100%; padding: 15px; border-radius: 8px; font-size: 1rem; margin-top: 15px; }
        .btn-buy:hover { background: #1a41cc; }

        /* Tabs e Listas */
        .nav-tabs { border-bottom: 1px solid var(--border-color); }
        .nav-link { color: var(--text-muted); font-weight: 500; border: none !important; padding: 10px 0; margin-right: 20px; background: transparent !important; }
        .nav-link.active { color: var(--text-main); border-bottom: 2px solid var(--poly-blue) !important; }
        
        .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        
        #chat-box { height: 250px; overflow-y: auto; padding-right: 10px; }
        .msg { margin-bottom: 10px; font-size: 0.9rem; }
        .msg-user { font-weight: 600; color: var(--poly-blue); }

        /* Admin Box */
        .admin-box { border: 1px solid #eab308; background: rgba(234, 179, 8, 0.05); }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-2">
        <div style="width: 28px; height: 28px; background: var(--poly-blue); border-radius: 50%;"></div>
        <span class="fs-5 fw-bold">PilaMarket</span>
    </div>
    <div class="d-flex gap-3 align-items-center">
        <div class="nav-balance">
            <span id="user-name" class="text-muted me-2">Visitante</span>
            <span id="balance-display">$0.00</span>
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="showProfileModal()">Trocar Conta</button>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="d-flex align-items-center gap-3 mb-2">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Flag_of_Brazil.svg/2560px-Flag_of_Brazil.svg.png" width="40" height="28" style="border-radius: 4px;">
                <h1 class="market-title m-0">O Brasil vai sediar a Copa do Mundo de 2030?</h1>
            </div>
            <div class="market-stats">
                <span id="total-vol">$0.00 Vol.</span> • <span class="text-success" id="price-yes-header">50¢ Sim</span> • <span class="text-danger" id="price-no-header">50¢ Não</span>
            </div>

            <div class="panel mb-4" style="height: 350px;">
                <canvas id="marketChart"></canvas>
            </div>

            <ul class="nav nav-tabs mb-3" id="marketTabs" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#portfolio">O Meu Portfólio</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#chat">Comunidade</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#leaderboard">Leaderboard</button></li>
            </ul>

            <div class="tab-content panel">
                <div class="tab-pane fade show active" id="portfolio">
                    <div id="portfolio-content">
                        </div>
                </div>
                
                <div class="tab-pane fade" id="chat">
                    <div id="chat-box" class="mb-3"></div>
                    <div class="input-group">
                        <input type="text" id="chat-input" class="form-control bg-dark text-white border-secondary" placeholder="Manda a tua posta de pescada...">
                        <button class="btn btn-primary" onclick="sendMessage()">Enviar</button>
                    </div>
                </div>

                <div class="tab-pane fade" id="leaderboard">
                    <div id="leaderboard-content"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="panel order-ticket mb-4">
                <h5 class="fw-bold mb-3">Comprar</h5>
                
                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <button id="opt-yes" class="btn-yes" onclick="selectOption('SIM')">
                            Sim <span id="price-yes-btn" class="ms-1">50¢</span>
                        </button>
                    </div>
                    <div class="col-6">
                        <button id="opt-no" class="btn-no" onclick="selectOption('NÃO')">
                            Não <span id="price-no-btn" class="ms-1">50¢</span>
                        </button>
                    </div>
                </div>

                <div class="mb-3 position-relative">
                    <span style="position: absolute; left: 15px; top: 15px; color: var(--text-muted); font-weight: 600;">$</span>
                    <input type="number" id="bet-amount" class="input-amount" placeholder="0" oninput="calculateTrade()">
                </div>

                <div class="summary-row">
                    <span>Preço Médio</span>
                    <span class="summary-val" id="summary-price">0.00¢</span>
                </div>
                <div class="summary-row">
                    <span>Ações Estimadas</span>
                    <span class="summary-val" id="summary-shares">0.00</span>
                </div>
                <div class="summary-row">
                    <span>Retorno Potencial</span>
                    <span class="summary-val text-success" id="summary-return">$0.00 (0%)</span>
                </div>

                <button class="btn-buy" onclick="executeTrade()">Comprar</button>
            </div>

            <div id="admin-section" class="panel admin-box d-none">
                <h6 class="text-warning fw-bold mb-3">👑 Admin Zone</h6>
                <div class="d-flex gap-2 mb-2">
                    <button class="btn btn-success btn-sm w-100" onclick="resolveMarket('SIM')">Venceu SIM</button>
                    <button class="btn btn-danger btn-sm w-100" onclick="resolveMarket('NÃO')">Venceu NÃO</button>
                </div>
                <button class="btn btn-outline-light btn-sm w-100" onclick="exportToPDF()">Exportar PDF</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="profileModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content" style="background: var(--bg-panel); color: white;">
            <div class="modal-body p-4 text-center">
                <h5 class="fw-bold mb-4">Entrar como:</h5>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-light" onclick="login('Sá')">Sá</button>
                    <button class="btn btn-outline-light" onclick="login('Pedro')">Pedro</button>
                    <button class="btn btn-outline-light" onclick="login('Silva')">Silva</button>
                    <button class="btn btn-outline-warning mt-2" onclick="promptAdmin()">Admin</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- ESTADO (AMM Baseado em Ações) ---
    // Em Polymarket: Preço SIM + Preço NÃO = $1.00
    // Cada ação vencedora paga $1.00.
    const DEFAULT_USERS = {
        "Sá": { balance: 100, sharesYes: 0, sharesNo: 0 },
        "Pedro": { balance: 100, sharesYes: 0, sharesNo: 0 },
        "Silva": { balance: 100, sharesYes: 0, sharesNo: 0 },
        "Admin": { balance: 1000, sharesYes: 0, sharesNo: 0 } // Admin tem guito e joga também
    };

    let state = JSON.parse(localStorage.getItem('polyCloneState')) || {
        users: DEFAULT_USERS,
        poolYes: 50, // Liquidez inicial ($)
        poolNo: 50,
        volume: 0,
        history: [], // Histórico de preços
        bets: [],    // Histórico de apostas para o PDF
        messages: []
    };

    let currentUser = null;
    let selectedOption = 'SIM'; // Default
    let chart;

    // --- CÁLCULO DE PREÇOS (AMM) ---
    function getPrices() {
        const total = state.poolYes + state.poolNo;
        let priceYes = state.poolYes / total;
        let priceNo = state.poolNo / total;
        return { yes: priceYes, no: priceNo };
    }

    function updateUI() {
        const prices = getPrices();
        
        // Atualiza cabeçalho e botões
        document.getElementById('price-yes-header').innerText = `${(prices.yes * 100).toFixed(1)}¢ Sim`;
        document.getElementById('price-no-header').innerText = `${(prices.no * 100).toFixed(1)}¢ Não`;
        document.getElementById('price-yes-btn').innerText = `${(prices.yes * 100).toFixed(1)}¢`;
        document.getElementById('price-no-btn').innerText = `${(prices.no * 100).toFixed(1)}¢`;
        document.getElementById('total-vol').innerText = `$${state.volume.toFixed(2)} Vol.`;

        // Botões de seleção
        document.getElementById('opt-yes').classList.toggle('active', selectedOption === 'SIM');
        document.getElementById('opt-no').classList.toggle('active', selectedOption === 'NÃO');

        if (currentUser) {
            const u = state.users[currentUser];
            document.getElementById('balance-display').innerText = `$${u.balance.toFixed(2)}`;
            document.getElementById('user-name').innerText = currentUser;
            
            // Portfólio
            const portDiv = document.getElementById('portfolio-content');
            portDiv.innerHTML = `
                <div class="list-item"><span class="text-muted">Ações SIM (Pagam $1 se ganhar)</span> <b>${u.sharesYes.toFixed(2)}</b></div>
                <div class="list-item"><span class="text-muted">Ações NÃO (Pagam $1 se ganhar)</span> <b>${u.sharesNo.toFixed(2)}</b></div>
                <div class="list-item border-0"><span class="text-muted">Valor em Dinheiro Vivo</span> <b class="text-success">$${u.balance.toFixed(2)}</b></div>
            `;
        }

        renderLeaderboard();
        calculateTrade();
        saveState();
    }

    // --- CÁLCULO DA TICKET ---
    function calculateTrade() {
        const amount = parseFloat(document.getElementById('bet-amount').value) || 0;
        const prices = getPrices();
        const price = selectedOption === 'SIM' ? prices.yes : prices.no;

        if (amount <= 0) {
            document.getElementById('summary-price').innerText = `${(price * 100).toFixed(1)}¢`;
            document.getElementById('summary-shares').innerText = "0.00";
            document.getElementById('summary-return').innerText = "$0.00 (0%)";
            return;
        }

        // Quantas ações compro com este dinheiro? (Ação = Dinheiro / Preço)
        const shares = amount / price;
        // Retorno se ganhar (Cada ação paga $1, logo retorno = número de ações)
        const potentialReturn = shares; 
        const roi = ((potentialReturn - amount) / amount) * 100;

        document.getElementById('summary-price').innerText = `${(price * 100).toFixed(1)}¢`;
        document.getElementById('summary-shares').innerText = shares.toFixed(2);
        document.getElementById('summary-return').innerText = `$${potentialReturn.toFixed(2)} (+${roi.toFixed(0)}%)`;
    }

    function selectOption(opt) {
        selectedOption = opt;
        updateUI();
    }

    function executeTrade() {
        if (!currentUser) return alert("Faz login primeiro!");
        const amount = parseFloat(document.getElementById('bet-amount').value);
        if (!amount || amount <= 0) return alert("Insere um valor válido!");
        
        const user = state.users[currentUser];
        if (amount > user.balance) return alert("Saldo insuficiente. O teu saldo é $" + user.balance.toFixed(2));

        const prices = getPrices();
        const price = selectedOption === 'SIM' ? prices.yes : prices.no;
        const sharesBought = amount / price;

        // Deduz saldo e adiciona ações
        user.balance -= amount;
        if (selectedOption === 'SIM') {
            user.sharesYes += sharesBought;
            state.poolYes += amount; // Dinheiro entra na pool correspondente, subindo o seu preço
        } else {
            user.sharesNo += sharesBought;
            state.poolNo += amount;
        }

        state.volume += amount;
        state.bets.push({ user: currentUser, option: selectedOption, amount: amount, shares: sharesBought, date: new Date().toLocaleTimeString() });
        state.history.push({ time: new Date().toLocaleTimeString(), priceYes: getPrices().yes * 100 });
        
        addChatMessage(`comprou ${sharesBought.toFixed(1)} ações do ${selectedOption} por $${amount.toFixed(2)}.`);
        
        document.getElementById('bet-amount').value = '';
        updateUI();
        updateChart();
    }

    // --- CHAT ---
    function sendMessage() {
        const input = document.getElementById('chat-input');
        if (!input.value || !currentUser) return;
        addChatMessage(input.value, false);
        input.value = "";
    }

    function addChatMessage(msg, isTrade = false) {
        state.messages.push({ user: currentUser, text: msg, isTrade: isTrade });
        renderChat();
    }

    function renderChat() {
        const box = document.getElementById('chat-box');
        box.innerHTML = state.messages.map(m => `
            <div class="msg">
                <span class="msg-user ${m.user==='Admin'?'text-warning':''}">${m.user}</span> 
                <span style="color: ${m.isTrade ? 'var(--text-muted)' : 'var(--text-main)'}">${m.text}</span>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    // --- LEADERBOARD ---
    function renderLeaderboard() {
        const lb = document.getElementById('leaderboard-content');
        // Calcula o valor total (Saldo + Valor estimado das ações ao preço atual)
        const prices = getPrices();
        const rankings = Object.entries(state.users).map(([name, data]) => {
            const totalValue = data.balance + (data.sharesYes * prices.yes) + (data.sharesNo * prices.no);
            return { name, totalValue };
        }).sort((a, b) => b.totalValue - a.totalValue);

        lb.innerHTML = rankings.map((r, i) => `
            <div class="list-item">
                <span>${i + 1}. ${r.name} ${r.name === 'Admin' ? '👑' : ''}</span>
                <span class="fw-bold">$${r.totalValue.toFixed(2)}</span>
            </div>
        `).join('');
    }

    // --- PERFIL ---
    function login(user) {
        if (!state.users[user]) state.users[user] = DEFAULT_USERS[user]; // Fallback
        currentUser = user;
        bootstrap.Modal.getInstance(document.getElementById('profileModal')).hide();
        
        const adminSection = document.getElementById('admin-section');
        if (user === 'Admin') adminSection.classList.remove('d-none');
        else adminSection.classList.add('d-none');
        
        updateUI();
    }

    function promptAdmin() {
        const p = prompt("Password do Admin (1234):");
        if (p === "1234") login('Admin');
        else alert("Password errada.");
    }

    function showProfileModal() {
        new bootstrap.Modal(document.getElementById('profileModal')).show();
    }

    // --- ADMIN: RESOLVER E PDF ---
    function resolveMarket(winner) {
        if (!confirm(`Tens a certeza que queres fechar o mercado e declarar ${winner} como vencedor?`)) return;
        
        // No Polymarket, se acertares, cada ação vale $1. As outras valem $0.
        Object.keys(state.users).forEach(user => {
            const u = state.users[user];
            if (winner === 'SIM') {
                u.balance += u.sharesYes * 1.00; // Paga $1 por ação SIM
            } else {
                u.balance += u.sharesNo * 1.00;  // Paga $1 por ação NÃO
            }
            // Zera as ações de todos
            u.sharesYes = 0;
            u.sharesNo = 0;
        });

        alert(`MERCADO RESOLVIDO! O resultado é ${winner}. Os ganhos foram distribuídos.`);
        
        // Reset do mercado
        state.poolYes = 50; 
        state.poolNo = 50;
        state.volume = 0;
        state.history = [];
        state.bets = [];
        
        updateUI();
        initChart(); // Limpa o gráfico
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("PilaMarket - Order Book Oficial", 14, 15);
        
        const rows = state.bets.map(b => [b.user, b.option, `$${b.amount.toFixed(2)}`, b.shares.toFixed(2), b.date]);
        doc.autoTable({
            head: [['Trader', 'Lado', 'Dólares (USDC)', 'Ações Compradas', 'Hora']],
            body: rows,
            startY: 25
        });
        
        doc.save("PilaMarket_Ledger.pdf");
    }

    function saveState() {
        localStorage.setItem('polyCloneState', JSON.stringify(state));
    }

    // --- GRÁFICO (Chart.js) ---
    function initChart() {
        const ctx = document.getElementById('marketChart').getContext('2d');
        if (chart) chart.destroy();
        
        // Se não houver histórico, cria um ponto inicial
        if (state.history.length === 0) {
            state.history.push({ time: new Date().toLocaleTimeString(), priceYes: 50 });
        }

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: state.history.map(h => h.time),
                datasets: [{
                    label: 'Preço SIM (¢)',
                    data: state.history.map(h => h.priceYes),
                    borderColor: '#00c853',
                    borderWidth: 2,
                    tension: 0.1,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { min: 0, max: 100, grid: { color: '#2b2f36' }, ticks: { color: '#8b94a3' } }, 
                    x: { display: false } 
                },
                plugins: { legend: { display: false } },
                interaction: { mode: 'index', intersect: false }
            }
        });
    }

    function updateChart() {
        const prices = getPrices();
        chart.data.labels.push(new Date().toLocaleTimeString());
        chart.data.datasets[0].data.push(prices.yes * 100);
        chart.update();
    }

    window.onload = () => {
        showProfileModal();
        initChart();
        renderChat();
        updateUI();
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
