<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilaMarket | Terminal de Previsões</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-black: #060709;
            --bg-panel: #111216;
            --bg-item: #1b1d23;
            --border-color: #2d3039;
            --poly-blue: #2152ff;
            --poly-green: #05d46c;
            --poly-red: #ff3f3f;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.02em;
        }

        /* --- NAVEGAÇÃO --- */
        .navbar {
            background: var(--bg-black);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
        }
        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.4rem;
            color: white;
            text-decoration: none;
        }
        .logo-icon {
            width: 35px; height: 35px;
            background: var(--poly-blue);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- LAYOUT --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            padding: 30px 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card-market {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }

        /* --- GRÁFICO REALISTA --- */
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }
        .price-large { font-size: 2.5rem; font-weight: 800; line-height: 1; }
        .chart-container { height: 420px; position: relative; }

        /* --- BOTÕES E INPUTS --- */
        .btn-trade {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            transition: 0.2s;
            background: var(--bg-item);
            color: var(--text-dim);
        }
        .btn-trade.active-yes { background: rgba(5, 212, 108, 0.15); color: var(--poly-green); border-color: var(--poly-green); }
        .btn-trade.active-no { background: rgba(255, 63, 63, 0.15); color: var(--poly-red); border-color: var(--poly-red); }

        .input-box {
            background: var(--bg-item);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .input-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            width: 100%;
            outline: none;
        }

        /* --- TABS --- */
        .nav-tabs { border-bottom: 1px solid var(--border-color); }
        .nav-link { 
            color: var(--text-dim); 
            border: none !important; 
            font-weight: 600; 
            padding: 12px 20px;
        }
        .nav-link.active { 
            background: transparent !important; 
            color: var(--poly-blue) !important; 
            border-bottom: 2px solid var(--poly-blue) !important; 
        }

        /* --- ADMIN PANEL --- */
        .admin-sidebar {
            background: #1a1505;
            border: 1px solid #4a3b0a;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .scroll-list {
            max-height: 300px;
            overflow-y: auto;
        }

        /* Estilo das mensagens */
        .chat-msg {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        .chat-msg b { color: var(--poly-blue); }

        .trader-card {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo-box">
        <div class="logo-icon"><i class="bi bi-intersect"></i></div>
        PilaMarket
    </a>
    <div class="d-flex gap-4 align-items-center">
        <div id="user-display" class="text-end">
            <div class="fw-bold" id="current-name">---</div>
            <div class="text-success small fw-bold" id="current-balance">$0.00 USDC</div>
        </div>
        <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="logout()">Sair</button>
    </div>
</nav>

<div class="main-grid">
    <div class="content-area">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div id="market-status-dot" style="width: 10px; height: 10px; background: var(--poly-green); border-radius: 50%;"></div>
            <h1 class="m-0 fw-800" id="active-question">A carregar mercado...</h1>
        </div>

        <div class="card-market mb-4">
            <div class="chart-header">
                <div>
                    <span class="text-dim small fw-bold">PREÇO SIM</span>
                    <div class="price-large" id="big-price">50¢</div>
                </div>
                <div class="text-end">
                    <span class="text-dim small fw-bold">VOLUME</span>
                    <div class="fw-bold" id="vol-display">$0.00</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="tradingChart"></canvas>
            </div>
        </div>

        <div class="card-market">
            <ul class="nav nav-tabs mb-3">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-pos">Portfólio</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-chat">Comunidade</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-rank">Classificação</button></li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="tab-pos">
                    <div id="portfolio-list"></div>
                </div>
                <div class="tab-pane fade" id="tab-chat">
                    <div id="chat-box" class="scroll-list mb-3"></div>
                    <div class="input-group">
                        <input type="text" id="chat-input" class="form-control bg-dark text-white" placeholder="Escreve aqui...">
                        <button class="btn btn-primary" onclick="sendMsg()">Enviar</button>
                    </div>
                </div>
                <div class="tab-pane fade" id="tab-rank">
                    <div id="leaderboard-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-area">
        <div class="card-market" id="user-trade-panel">
            <h5 class="fw-800 mb-4">Efetuar Aposta</h5>
            <div class="d-flex gap-2 mb-4">
                <button class="btn-trade active-yes" id="btn-y" onclick="setSide('SIM')">SIM</button>
                <button class="btn-trade" id="btn-n" onclick="setSide('NÃO')">NÃO</button>
            </div>
            
            <div class="input-box">
                <span class="text-dim small fw-bold">VALOR (USDC)</span>
                <input type="number" id="bet-val" value="10" oninput="calcPreview()">
            </div>

            <div class="mt-4 p-3 rounded" style="background: rgba(255,255,255,0.03);">
                <div class="d-flex justify-content-between mb-2 small">
                    <span class="text-dim">Ações a receber</span>
                    <span class="fw-bold" id="prev-shares">0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-2 small">
                    <span class="text-dim">Preço Médio</span>
                    <span class="fw-bold" id="prev-avg">0.50¢</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between">
                    <span class="text-dim">Retorno Potencial</span>
                    <span class="text-success fw-bold" id="prev-ret">$0.00</span>
                </div>
            </div>

            <button class="btn btn-primary w-100 py-3 mt-4 fw-bold rounded-3" onclick="buyShares()">SUBMETER ORDEM</button>
        </div>

        <div id="admin-panel" class="admin-sidebar d-none">
            <h6 class="text-warning fw-800 mb-3"><i class="bi bi-lightning-fill"></i> GESTÃO DE MERCADO</h6>
            
            <div class="mb-3">
                <label class="small text-dim fw-bold">NOVA PERGUNTA</label>
                <input type="text" id="new-q" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="O que vai acontecer?">
                <button class="btn btn-warning btn-sm w-100 mt-2 fw-bold" onclick="publishMarket()">PUBLICAR MERCADO</button>
            </div>

            <hr class="border-secondary">

            <div class="row g-2">
                <div class="col-6"><button class="btn btn-success btn-sm w-100 fw-bold" onclick="resolve('SIM')">Venceu SIM</button></div>
                <div class="col-6"><button class="btn btn-danger btn-sm w-100 fw-bold" onclick="resolve('NÃO')">Venceu NÃO</button></div>
            </div>
            
            <button class="btn btn-outline-light btn-sm w-100 mt-3" onclick="exportPDF()">EXPORTAR PDF DE AUDITORIA</button>
        </div>
    </div>
</div>

<div class="modal fade" id="modalLogin" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0" style="background: var(--bg-panel);">
            <div class="modal-body p-4 text-center">
                <h5 class="fw-800 mb-4">Escolha o seu Perfil</h5>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-light" onclick="login('Sá')">Sá</button>
                    <button class="btn btn-outline-light" onclick="login('Pedro')">Pedro</button>
                    <button class="btn btn-outline-light" onclick="login('Silva')">Silva</button>
                    <hr class="border-secondary">
                    <button class="btn btn-warning fw-bold text-black" onclick="login('Admin')">ADMINISTRADOR</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * PILAMARKET v4 ENGINE
     * Admin: Decisor e Publicador (Sem património)
     * Utilizadores: Sá, Pedro, Silva ($1000 cada)
     */

    let state = JSON.parse(localStorage.getItem('pila_v4')) || {
        traders: {
            "Sá": { bal: 1000, sY: 0, sN: 0 },
            "Pedro": { bal: 1000, sY: 0, sN: 0 },
            "Silva": { bal: 1000, sY: 0, sN: 0 }
        },
        market: {
            question: "O PilaMarket vai ser o maior site de apostas de Portugal?",
            liqY: 500,
            liqN: 500,
            vol: 0,
            history: []
        },
        msgs: []
    };

    let currentUser = null;
    let selectedSide = 'SIM';
    let chart = null;

    // --- INICIALIZAÇÃO ---
    function init() {
        if (state.market.history.length === 0) seedChart();
        updateUI();
        initChart();
        
        if (!currentUser) new bootstrap.Modal('#modalLogin').show();
    }

    function seedChart() {
        // Gerar gráfico realista inicial (Random Walk)
        let price = 50;
        let now = Date.now();
        for(let i=100; i>0; i--) {
            price += (Math.random() * 4 - 2);
            if(price > 98) price = 98; if(price < 2) price = 2;
            state.market.history.push({ t: now - (i * 60000), p: price });
        }
        save();
    }

    // --- LOGICA DE MERCADO ---
    function getPrice() {
        return state.market.liqY / (state.market.liqY + state.market.liqN);
    }

    function updateUI() {
        const p = getPrice();
        document.getElementById('active-question').innerText = state.market.question;
        document.getElementById('big-price').innerText = (p * 100).toFixed(0) + "¢";
        document.getElementById('big-price').style.color = p > 0.5 ? 'var(--poly-green)' : 'var(--poly-red)';
        document.getElementById('vol-display').innerText = "$" + state.market.vol.toFixed(2);

        if (currentUser && currentUser !== 'Admin') {
            const u = state.traders[currentUser];
            document.getElementById('current-name').innerText = currentUser;
            document.getElementById('current-balance').innerText = "$" + u.bal.toFixed(2) + " USDC";
            document.getElementById('user-trade-panel').classList.remove('d-none');
            
            // Portfolio
            document.getElementById('portfolio-list').innerHTML = `
                <div class="trader-card text-dim small fw-bold"><span>ATIVO</span><span>QTD</span><span>VALOR EST.</span></div>
                <div class="trader-card"><span>Ações SIM</span><span>${u.sY.toFixed(1)}</span><span>$${(u.sY * p).toFixed(2)}</span></div>
                <div class="trader-card"><span>Ações NÃO</span><span>${u.sN.toFixed(1)}</span><span>$${(u.sN * (1-p)).toFixed(2)}</span></div>
            `;
        } else if (currentUser === 'Admin') {
            document.getElementById('current-name').innerText = "ADMINISTRADOR";
            document.getElementById('current-balance').innerText = "CONTROLO TOTAL";
            document.getElementById('user-trade-panel').classList.add('d-none');
            document.getElementById('admin-panel').classList.remove('d-none');
        }

        renderRanks();
        renderChat();
        calcPreview();
    }

    // --- TRADING ---
    function setSide(s) {
        selectedSide = s;
        document.getElementById('btn-y').className = s === 'SIM' ? 'btn-trade active-yes' : 'btn-trade';
        document.getElementById('btn-n').className = s === 'NÃO' ? 'btn-trade active-no' : 'btn-trade';
        calcPreview();
    }

    function calcPreview() {
        const val = parseFloat(document.getElementById('bet-val').value) || 0;
        const p = selectedSide === 'SIM' ? getPrice() : (1 - getPrice());
        const shares = val / p;
        document.getElementById('prev-shares').innerText = shares.toFixed(2);
        document.getElementById('prev-avg').innerText = (p * 100).toFixed(1) + "¢";
        document.getElementById('prev-ret').innerText = "$" + shares.toFixed(2);
    }

    function buyShares() {
        const val = parseFloat(document.getElementById('bet-val').value);
        const u = state.traders[currentUser];
        if (val > u.bal) return alert("Saldo insuficiente!");

        if (selectedSide === 'SIM') {
            state.market.liqY += val;
            u.sY += (val / getPrice());
        } else {
            state.market.liqN += val;
            u.sN += (val / (1 - getPrice()));
        }

        u.bal -= val;
        state.market.vol += val;
        state.market.history.push({ t: Date.now(), p: getPrice() * 100 });
        
        state.msgs.push({ u: "SISTEMA", t: `${currentUser} comprou $${val} no ${selectedSide}` });
        
        save();
        updateUI();
        updateChart();
    }

    // --- ADMIN ACTIONS ---
    function publishMarket() {
        const q = document.getElementById('new-q').value;
        if (!q) return;
        state.market.question = q;
        state.market.vol = 0;
        state.market.liqY = 500;
        state.market.liqN = 500;
        state.market.history = [];
        seedChart();
        
        // Reset as ações dos jogadores mas mantém o saldo
        for (let t in state.traders) {
            state.traders[t].sY = 0;
            state.traders[t].sN = 0;
        }

        alert("Novo mercado publicado!");
        save();
        location.reload();
    }

    function resolve(winner) {
        if (!confirm(`Confirmar ${winner} como vencedor?`)) return;
        
        for (let t in state.traders) {
            const u = state.traders[t];
            if (winner === 'SIM') u.bal += u.sY * 1;
            else u.bal += u.sN * 1;
            u.sY = 0; u.sN = 0;
        }

        alert("Mercado fechado e vencedores pagos!");
        save();
        updateUI();
    }

    // --- CHAT & RANK ---
    function sendMsg() {
        const i = document.getElementById('chat-input');
        if (!i.value) return;
        state.msgs.push({ u: currentUser, t: i.value });
        i.value = "";
        renderChat();
        save();
    }

    function renderChat() {
        const box = document.getElementById('chat-box');
        box.innerHTML = state.msgs.slice(-50).map(m => `
            <div class="chat-msg"><b>${m.u}:</b> ${m.t}</div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function renderRanks() {
        const p = getPrice();
        const sorted = Object.entries(state.traders).map(([name, u]) => {
            const nw = u.bal + (u.sY * p) + (u.sN * (1-p));
            return { name, nw };
        }).sort((a, b) => b.nw - a.nw);

        document.getElementById('leaderboard-list').innerHTML = sorted.map((u, i) => `
            <div class="trader-card">
                <span>${i+1}. ${u.name}</span>
                <span class="fw-bold">$${u.nw.toFixed(2)}</span>
            </div>
        `).join('');
    }

    // --- SISTEMA ---
    function login(u) {
        currentUser = u;
        bootstrap.Modal.getInstance('#modalLogin').hide();
        updateUI();
    }

    function logout() { location.reload(); }

    function save() { localStorage.setItem('pila_v4', JSON.stringify(state)); }

    function initChart() {
        const ctx = document.getElementById('tradingChart').getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 400);
        grad.addColorStop(0, 'rgba(33, 82, 255, 0.3)');
        grad.addColorStop(1, 'transparent');

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{
                    data: state.market.history.map(h => ({ x: h.t, y: h.p })),
                    borderColor: '#2152ff',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: grad,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', display: false },
                    y: { position: 'right', min: 0, max: 100, grid: { color: '#222' }, ticks: { color: '#555' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function updateChart() {
        chart.data.datasets[0].data = state.market.history.map(h => ({ x: h.t, y: h.p }));
        chart.update();
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("PilaMarket - Relatorio de Auditoria", 14, 20);
        doc.text(`Mercado: ${state.market.question}`, 14, 30);
        
        const rows = Object.entries(state.traders).map(([n, u]) => [n, `$${u.bal.toFixed(2)}`, u.sY.toFixed(1), u.sN.toFixed(1)]);
        doc.autoTable({
            head: [['Trader', 'Saldo USDC', 'Ações SIM', 'Ações NÃO']],
            body: rows,
            startY: 40
        });
        doc.save("auditoria_pilamarket.pdf");
    }

    window.onload = init;
</script>

</body>
</html>
